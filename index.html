<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="实用工具 - 一站式综合在线效率工具平台" />
    <meta name="theme-color" content="#889df0" />
    <title>实用工具</title>
    <!-- 预连接到 GitHub Pages CDN -->
    <link rel="preconnect" href="https://weicong2014210926.github.io" />
    <link rel="dns-prefetch" href="https://weicong2014210926.github.io" />
    <style>
      /* 首屏骨架屏 - 在 JS 加载前展示 */
      #skeleton{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f5f0e8;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
      #skeleton .logo{font-size:32px;font-weight:800;background:linear-gradient(135deg,#889df0,#82d5bb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
      #skeleton .spinner{width:36px;height:36px;border:3px solid #e8e0d0;border-top-color:#889df0;border-radius:50%;animation:s 0.8s linear infinite}
      @keyframes s{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="skeleton">
        <div class="logo">实用工具</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
